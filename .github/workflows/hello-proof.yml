name: hello-proof

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tools
        run: make -C tools
      - name: All proofs
        run: ./scripts/check-all-proofs.sh
